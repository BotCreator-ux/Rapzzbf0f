name: ReDroid-Bot-Full-Rapzz
on: workflow_dispatch

jobs:
  android-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=redroid-runner

      - name: Install ADB, Docker Dependencies, and Python
        run: |
          sudo apt-get update
          sudo apt-get install -y adb python3-pip python3
          pip3 install pure-python-adb --break-system-packages || pip3 install pure-python-adb
          adb start-server

      - name: Setup ReDroid & Web Screen Streamer
        run: |
          # Load modul kernel Linux untuk Android Container
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux
          
          # 1. Jalankan Android ReDroid (Resolution 1280x720)
          sudo docker run -d --rm \
            --name redroid \
            --privileged \
            -p 5555:5555 \
            redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=1280 \
            androidboot.redroid_height=720 \
            androidboot.redroid_dpi=320

          echo "Menunggu Android booting..."
          sleep 15
          adb connect 127.0.0.1:5555
          adb wait-for-device
          echo "Android ReDroid siap!"

          # 2. Jalankan Server GUI Web (Biar bisa di-remote dari browser HP kamu via port 8000)
          sudo docker run -d --rm \
            --name remote-web \
            --net=host \
            importre/ws-scrcpy

      - name: Auto Inject Guest Account File
        run: |
          mkdir -p ./ff_guest
          
          # Write data json guest mu ke file lokal
          cat << 'EOF' > ./ff_guest/guest100067.dat
          {"guest_account_info":{"com.garena.msdk.guest_password":"sendi_QLRMJ_BY_SPIDEERIO_GAMING_U305P","com.garena.msdk.guest_uid":"4666437728"}}
          EOF

          # Push ke path eksternal shared storage
          adb shell mkdir -p /sdcard/com.garena.msdk/
          adb push ./ff_guest/guest100067.dat /sdcard/com.garena.msdk/guest100067.dat
          adb shell chmod 666 /sdcard/com.garena.msdk/guest100067.dat

          # Push juga ke path internal sandbox aplikasi (jaga-jaga biar auto-read)
          adb shell mkdir -p /data/data/com.dts.freefireth/files/
          adb push ./ff_guest/guest100067.dat /data/data/com.dts.freefireth/files/guest100067.dat
          adb shell chmod 777 /data/data/com.dts.freefireth/files/guest100067.dat
          
          echo "✅ Akun Guest Sukses Di-inject!"

      - name: Create Python Macro Bot Script
        run: |
          cat << 'EOF' > bot_macro.py
          import time
          import os
          from ppadb.client import Client as AdbClient

          def run_bot():
              print("Menghubungkan script makro ke ADB lokal...")
              client = AdbClient(host="127.0.0.1", port=5037)
              devices = client.devices()
              
              if len(devices) == 0:
                  print("Error: Android tidak ditemukan!")
                  return
                  
              device = devices[0]
              print("Bot Makro AFK Clash Squad Dimulai... 🤖")
              
              # Loop nonstop 24/7 buat spam tombol dan gerak
              while True:
                  try:
                      # 1. Simulasi tombol Maju (Swipe dari tengah bawah ke tengah atas)
                      # Koordinat layar 1280x720 (X1=300, Y1=600 ke X2=300, Y2=300 selama 1.5 detik)
                      device.shell("input swipe 300 600 300 300 1500")
                      
                      # 2. Klik posisi Skill Aktif Homer (Misal estimasi posisi tombol skill di koordinat X=1100, Y=500)
                      # Silakan sesuaikan koordinat tombol ini lewat remote browser nanti
                      device.shell("input tap 1100 500")
                      
                      # 3. Klik tombol 'Mulai/Gas Match' (Jaga-jaga kalau match selesai, biar auto masuk lagi)
                      # Biasanya di lobby / halaman score tombol ada di pojok kanan bawah (X=1150, Y=650)
                      device.shell("input tap 1150 650")
                      
                      print("Bot Action: Maju + Spam Skill Homer + Check Ready.")
                      time.sleep(2) # Jeda per aksi
                      
                  except Exception as e:
                      print(f"Ada error/DC, mencoba ulang... Error: {e}")
                      time.sleep(5)

          if __name__ == "__main__":
              run_bot()
          EOF

      - name: Start Macro Bot & Show Remote Info
        run: |
          TS_IP=$(tailscale ip -4)
          
          echo -e "\n=================================================="
          echo -e "       REDROID BOT READY FOR ANDROID PHONE!        "
          echo -e "=================================================="
          echo -e "Cara Buka Layar Android di HP Kamu:"
          echo -e "1. Pastikan aplikasi Tailscale di HP kamu sudah AKTIF."
          echo -e "2. Buka Google Chrome di HP, lalu ketik URL ini:"
          echo -e "   http://$TS_IP:8000"
          echo -e "==================================================\n"
          
          # Jalankan script macro Python di background agar loop berjalan mandiri
          python3 bot_macro.py &
          
          # Keep Alive Runner biar ga mati selama 6 jam
          while true; do
            echo "[$(date +%H:%M:%S)] Container Android & Macro Bot is alive... 🕺"
            sleep 300
          done
